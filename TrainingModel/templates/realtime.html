<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Posture Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #video-container {
            position: relative;
            width: 100%;
            margin-top: 20px;
            background-color: #000;
            border-radius: 5px;
            overflow: hidden;
        }
        #video-feed {
            width: 100%;
            border-radius: 5px;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            text-align: center;
        }
        .good {
            color: #28a745;
        }
        .bad {
            color: #dc3545;
        }
        .status {
            text-align: center;
            margin: 10px 0;
            font-style: italic;
            color: #6c757d;
        }
        .error {
            color: #dc3545;
            text-align: center;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .camera-permission {
            text-align: center;
            margin: 20px 0;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Real-time Posture Detection</h1>
        
        <div class="status" id="status">Connecting to camera...</div>
        <div class="error" id="error" style="display: none;"></div>
        
        <div class="camera-permission" id="camera-permission" style="display: none;">
            <h3>Camera Access Required</h3>
            <p>Please allow camera access in your browser to use this application.</p>
            <button class="btn btn-primary" onclick="location.reload()">Retry Camera Access</button>
        </div>
        
        <div id="video-container">
            <img id="video-feed" src="" alt="Video feed">
        </div>
        
        <div class="prediction" id="prediction"></div>
    </div>

    <script>
        const socket = io();
        const videoFeed = document.getElementById('video-feed');
        const predictionDiv = document.getElementById('prediction');
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const cameraPermissionDiv = document.getElementById('camera-permission');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            statusDiv.style.display = 'none';
        }
        
        function showStatus(message) {
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
        
        socket.on('connect', () => {
            showStatus('Connecting to camera...');
        });
        
        socket.on('disconnect', () => {
            showStatus('Disconnected from camera');
            videoFeed.src = '';
            predictionDiv.textContent = '';
        });
        
        socket.on('error', (data) => {
            showError(data.message);
            if (data.message.includes('camera')) {
                cameraPermissionDiv.style.display = 'block';
            }
        });
        
        socket.on('status', (data) => {
            showStatus(data.message);
        });
        
        socket.on('frame', (data) => {
            videoFeed.src = 'data:image/jpeg;base64,' + data.image;
            predictionDiv.textContent = `${data.prediction} Posture (${data.confidence} confidence)`;
            predictionDiv.className = `prediction ${data.prediction.toLowerCase()}`;
            errorDiv.style.display = 'none';
            cameraPermissionDiv.style.display = 'none';
        });
    </script>
</body>
</html>
