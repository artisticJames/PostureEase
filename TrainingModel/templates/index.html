<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Analysis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .result-image {
            max-width: 100%;
            margin-top: 20px;
            border-radius: 5px;
        }
        .prediction {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        .good {
            color: #28a745;
        }
        .bad {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Posture Analysis</h1>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" class="mb-4">
            <div class="mb-3">
                <label for="file" class="form-label">Upload an image for posture analysis:</label>
                <input type="file" class="form-control" id="file" name="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-primary">Analyze Posture</button>
        </form>

        {% if result %}
        <div class="text-center">
            <div class="prediction {% if result.prediction == 'Good' %}good{% else %}bad{% endif %}">
                {{ result.prediction }} Posture ({{ result.confidence }} confidence)
            </div>
            <img src="data:image/jpeg;base64,{{ result.image }}" class="result-image" alt="Analyzed posture">
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
